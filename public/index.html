<!DOCTYPE html>
<html lang="so">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>Waafi Amaah</title>

    <!-- FIXED Telegram WebApp SDK -->
    <script src="https://telegram.org/js/telegram-web-app.js"></script>

    <style>
        body { font-family: -apple-system, sans-serif; background-color: #f4f7f6; margin: 0; padding: 0; display: flex; flex-direction: column; align-items: center; }

        .app-header { width: 100%; background: #2e7d32; padding: 15px 20px; color: white; display: flex; justify-content: space-between; align-items: center; box-sizing: border-box; }

        .back-btn { display: flex; align-items: center; font-size: 16px; cursor: pointer; }

        .card { background: white; width: 92%; max-width: 450px; margin-top: 20px; padding: 25px; border-radius: 15px; box-shadow: 0 4px 15px rgba(0,0,0,0.05); box-sizing: border-box; }

        h2 { text-align: center; margin: 0 0 5px 0; font-size: 22px; color: #333; }

        .step-text { text-align: center; font-size: 12px; color: #888; margin-bottom: 15px; }

        .progress-bar { display: flex; gap: 5px; margin-bottom: 25px; }

        .step { height: 4px; flex: 1; background: #e0e0e0; border-radius: 2px; }

        .step.active { background: #82d13d; }

        .input-group { margin-bottom: 20px; }

        label { display: block; font-size: 14px; font-weight: 600; margin-bottom: 8px; color: #444; }

        select, input, textarea { width: 100%; padding: 12px; border: 1px solid #ddd; border-radius: 8px; font-size: 15px; box-sizing: border-box; background: #fdfdfd; }

        .btn-green { background: #4caf50; color: white; border: none; width: 100%; padding: 16px; border-radius: 10px; font-size: 16px; font-weight: bold; cursor: pointer; text-transform: uppercase; margin-top: 10px; }

        .result-container { background: #f9f9f9; padding: 15px; border-radius: 10px; text-align: center; margin: 20px 0; }

        .result-val { color: #82d13d; font-size: 28px; font-weight: bold; margin: 5px 0; }

        .footer { text-align: center; font-size: 12px; color: #aaa; margin: 30px 0; }

        .hidden { display: none; }
    </style>
</head>

<body>

<div class="app-header">
    <div class="back-btn" onclick="showPage('calculator')">← Dib u noqo</div>
    <div style="font-weight:bold">Waafi</div>
    <div>☰</div>
</div>

<!-- PAGE 1 -->
<div id="calculatorPage" class="card">
    <h2>Hel Amaah Deg Deg ah</h2>
    <p class="step-text">Ansixid degdeg ah • Qiimo tartan ah</p>

    <div class="input-group">
        <label>Qaddarka: <span id="valAmt" style="color:#82d13d">$1,000</span></label>
        <input type="range" id="amt" min="100" max="5000" step="100" value="1000" oninput="updateCalc()">
    </div>

    <div class="input-group">
        <label>Muddada: <span id="valDur" style="color:#82d13d">12 bilood</span></label>
        <input type="range" id="dur" min="6" max="60" step="6" value="12" oninput="updateCalc()">
    </div>

    <div class="result-container">
        <p style="margin:0; color:#666">Lacagta Bisha</p>
        <p id="monthly" class="result-val">$98.33</p>
    </div>

    <button class="btn-green" onclick="showPage('form')">CODSO HADDA</button>
</div>

<!-- PAGE 2 -->
<div id="formPage" class="card hidden">
    <h2>Codsiga Amaahda</h2>
    <p class="step-text">Tallaabada 1 ee 3</p>

    <div class="progress-bar">
        <div class="step active"></div>
        <div class="step"></div>
        <div class="step"></div>
    </div>

    <div class="input-group">
        <label>Nooca Amaahda</label>
        <select id="loanType">
            <option>Amaah Shakhsi ah</option>
            <option>Amaah Ganacsi</option>
            <option>Waxbarasho</option>
        </select>
    </div>

    <div class="input-group">
        <label>Qaddarka Amaahda ($)</label>
        <input type="number" id="formAmt" value="1000">
    </div>

    <div class="input-group">
        <label>Muddada Amaahda</label>
        <select id="formDur">
            <option value="6">6 Bilood</option>
            <option value="12" selected>12 Bilood</option>
            <option value="24">24 Bilood</option>
            <option value="36">36 Bilood</option>
        </select>
    </div>

    <div class="input-group">
        <label>Ujeedada Amaahda</label>
        <textarea id="reason" rows="3"></textarea>
    </div>

    <button class="btn-green" onclick="submitToBot()">TALLAABADA XIGTA</button>
</div>

<div class="footer">© 2025 Waafi Soomaaliya</div>

<script>
    function updateCalc() {
        const a = Number(document.getElementById('amt').value);
        const d = Number(document.getElementById('dur').value);

        document.getElementById('valAmt').innerText = `$${a.toLocaleString()}`;
        document.getElementById('valDur').innerText = `${d} bilood`;

        document.getElementById('monthly').innerText = `$${((a * 1.18) / d).toFixed(2)}`;

        document.getElementById('formAmt').value = a;
    }

    function showPage(page) {
        document.getElementById('calculatorPage').classList.toggle('hidden', page !== 'calculator');
        document.getElementById('formPage').classList.toggle('hidden', page !== 'form');
    }

    function submitToBot() {
        const tg = window.Telegram?.WebApp;

        if (!tg) {
            alert("Telegram WebApp not detected");
            return;
        }

        const data = {
            type: document.getElementById('loanType').value,
            amount: document.getElementById('formAmt').value,
            duration: document.getElementById('formDur').value,
            reason: document.getElementById('reason').value
        };

        tg.sendData(JSON.stringify(data));
        tg.close();
    }

    window.onload = () => {
        const tg = window.Telegram?.WebApp;

        if (tg) {
            tg.ready();
            tg.expand();
        }

        updateCalc();
    };
</script>

</body>
</html>
